<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CricTrack — You're Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #080e1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .glow {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .monogram {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      color: #a78bfa;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #6366f1;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn:active { opacity: 0.8; transform: scale(0.97); }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 2px;
      margin: 28px auto;
    }

    .hint {
      font-size: 11px;
      color: #334155;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.85; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="monogram">CRICTRACK</div>

  <div class="icon">📡</div>

  <h1>You're offline</h1>
  <p>
    No internet connection detected.<br />
    Check your Wi-Fi or mobile data, then tap Retry.
  </p>

  <button class="btn" onclick="window.location.reload()">
    ↺ Retry
  </button>

  <div class="divider"></div>
  <p class="hint">Live scores will resume when you're back online</p>
</body>
</html>
